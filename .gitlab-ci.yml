stages:
  - build
  - deploy

variables:
  DEPLOY_SERVER: "cz@192.168.0.108"
  DEPLOY_PATH: "/data/ai_course"
  FRONTEND_DIR: "react-frontend"
  BACKEND_DIR: "go-backend"

  GOPROXY: "https://goproxy.cn,direct"
  GOSUMDB: "sum.golang.google.cn"

  # CI: "false"

build_frontend:
  stage: build
  tags:
    - "dev"
  script:
    - cd $FRONTEND_DIR
    - npm install
    - npm run build
  artifacts:
    paths:
      - $FRONTEND_DIR/dist/
    expire_in: 1 hour

build_backend:
  stage: build
  tags:
    - "dev"
  script:
    - cd $BACKEND_DIR
    - export GOPROXY=$GOPROXY
    - export GOSUMDB=$GOSUMDB
    - go mod download
    - go build -o ai_course .
  artifacts:
    paths:
      - $BACKEND_DIR/ai_course
    expire_in: 1 hour

deploy:
  stage: deploy
  tags:
    - "dev"
  dependencies:
    - build_frontend
    - build_backend
  script:
    - ssh $DEPLOY_SERVER "mkdir -p $DEPLOY_PATH/web $DEPLOY_PATH/backend"

    # 部署前端
    - rsync -az --delete $FRONTEND_DIR/dist/ $DEPLOY_SERVER:$DEPLOY_PATH/web/

    # 再上传后端
    - rsync -az $BACKEND_DIR/ai_course $DEPLOY_SERVER:$DEPLOY_PATH/backend/

    # 杀进程
    - ssh $DEPLOY_SERVER "fuser -k 8093/tcp || true"
    # 启动
    - ssh $DEPLOY_SERVER "nohup $DEPLOY_PATH/backend/aistudy-backend > output.log 2>&1 &"
    - echo "部署完成"
